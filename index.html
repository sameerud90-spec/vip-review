<!DOCTYPE html>
<html>
<head>
<title>VIP Furniture Patna Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:linear-gradient(135deg,#000000,#7a0000,#000000);
  color:white;
  overflow:hidden;
}

/* Golden Animation Background */
.gold-bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, rgba(255,215,0,0.15), transparent 70%);
  animation: glow 3s infinite alternate;
}
@keyframes glow{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

.box{
  position:relative;
  margin-top:80px;
  padding:20px;
}

h1{
  font-size:28px;
  color:gold;
  text-shadow:0 0 15px gold;
  animation: shine 2s infinite alternate;
}

@keyframes shine{
  from{text-shadow:0 0 10px gold;}
  to{text-shadow:0 0 25px gold;}
}

textarea{
  width:90%;
  height:140px;
  border-radius:12px;
  padding:15px;
  font-size:16px;
  border:2px solid gold;
  background:#111;
  color:white;
  box-shadow:0 0 10px gold;
}

button{
  padding:15px 25px;
  margin-top:20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:gold;
  color:black;
  font-weight:bold;
  box-shadow:0 0 15px gold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px gold;
}

.footer{
  margin-top:20px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="gold-bg"></div>

<div class="box">
  <h1>👑 VIP Furniture Patna 👑</h1>
  <h2>अपना रिव्यू कॉपी करें और 5⭐ दें</h2>

  <textarea id="reviewText">
मैंने VIP Furniture Patna से फर्नीचर खरीदा और मेरा अनुभव बहुत ही शानदार रहा। यहाँ का लक्ज़री और रॉयल कलेक्शन बेहद खूबसूरत है। क्वालिटी बेहतरीन है और सर्विस भी समय पर मिली। पटना में फर्नीचर और होम डेकोर के लिए यह सबसे अच्छा शोरूम है। मैं सभी को यहाँ से खरीदारी करने की सलाह देता हूँ।
  </textarea>
  <br>

  <button onclick="copyReview()">⭐ रिव्यू कॉपी करें और 5 स्टार दें ⭐</button>

  <div class="footer">
    धन्यवाद! आपका समर्थन हमें और बेहतर बनने की प्रेरणा देता है।
  </div>
</div>

<script>
function copyReview() {
  var copyText = document.getElementById("reviewText");
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(copyText.value);

  alert("रिव्यू कॉपी हो गया! अब आप Google रिव्यू पेज पर जा रहे हैं।");

  window.location.href="https://search.google.com/local/writereview?placeid=ChIJ_BnZ6x2J7TkRoqYKsNQ06Z8";
}
</script>

</body>
</html>
