<script>

/* Particles */
for(let i=0;i<50;i++){
    let p=document.createElement("div");
    p.style.position="fixed";
    p.style.width="6px";
    p.style.height="6px";
    p.style.background="gold";
    p.style.borderRadius="50%";
    p.style.left=Math.random()*100+"vw";
    p.style.animation="particleMove 6s linear infinite";
    p.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(p);
}

/* Review Prompts Array */
let prompts=[
"❤️ VIP Furniture Patna gives best quality furniture and excellent service. Please give 5 ⭐ review.",
"🔥 Your feedback helps us improve our premium furniture service. Kindly rate your experience.",
"⭐ Were you satisfied with our furniture quality and delivery service? Please leave a review.",
"💎 VIP Furniture Patna values your opinion. Please support us with a 5 star rating.",
"🏆 We always try to provide royal quality furniture. Please share your experience.",
"😊 Did you like our customer service and product quality? Please give us 5 stars.",
"🚀 Help us grow by giving your valuable review about VIP Furniture Patna.",
"💖 Your review helps other customers choose the best furniture.",
"🎯 We aim for 100% customer satisfaction. Please rate your experience.",
"👑 Thank you for visiting VIP Furniture Patna. Please leave your feedback."
];

/* Random Review Popup */
setTimeout(()=>{
    let msg=prompts[Math.floor(Math.random()*prompts.length)];
    if(confirm(msg)){
        window.location.href="https://g.page/r/CaIQprDStOmfEAI/review";
    }
},4000);

</script>
